apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.*
    helm:
      valuesObject:
        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          storage:
            type: filesystem

        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        gateway:
          enabled: false

        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
